# Configuração do Fly.io para o FinançasPro Backend
# Depois de rodar `fly launch`, este arquivo é gerado/ajustado automaticamente.
# Este aqui já vem pronto — só ajuste o "app" para o nome que você escolher.

app = "valoraai"             # já publicado em https://valoraai.fly.dev
primary_region = "gru"        # gru = São Paulo, a região mais próxima do Brasil

[build]

[env]
  PORT = "3000"
  ALLOWED_ORIGIN = "*"        # troque pelo domínio do seu front-end em produção

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
